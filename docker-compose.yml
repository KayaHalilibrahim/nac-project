services:
  db:
    image: postgres:18-alpine
    container_name: nac_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: radius_db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d radius_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    network_mode: "host"

  redis:
    image: redis:8-alpine
    container_name: nac_redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
    network_mode: "host"

  api:
    build:
      context: ./api
      network: host  # Build sırasında DNS hatasını önlemek için kritik
    container_name: nac_api
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    network_mode: "host"
    restart: always

  freeradius:
    build:
      context: ./radius
      network: host  # Build sırasında curl yükleyebilmesi için kritik
    container_name: nac_radius
    volumes:
      - ./radius/api_call.sh:/etc/raddb/api_call.sh
      - ./radius/users:/etc/raddb/mods-config/files/authorize
    command: ["freeradius", "-X", "-f"]
    depends_on:
      - api
    network_mode: "host"
